name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hdv
          POSTGRES_PASSWORD: hdv
          POSTGRES_DB: hdv
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hdv"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://hdv:hdv@localhost:5432/hdv?schema=public
      AUTH_SECRET: ci-secret
      AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run db:generate
      - run: npm run db:migrate
      - run: npm run test
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
